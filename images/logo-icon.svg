  <!-- نوافذ المبنى الأيمن -->
  <rect x="52" y="52" width="8" height="8" fill="url(#iconGrad)"/>
  <rect x="65" y="52" width="8" height="8" fill="url(#iconGrad)"/>
  <rect x="52" y="69" width="8" height="8" fill="url(#iconGrad)"/>
